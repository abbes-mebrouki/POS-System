services:
  server:
    build: ./server
    restart: always
    environment:
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    volumes:
      - sqlite_data:/app/prisma   # ← persists the .db file

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    depends_on:
      - server

volumes:
  sqlite_data:
